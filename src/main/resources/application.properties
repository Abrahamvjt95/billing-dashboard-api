spring.application.name=billing-dashboard-api

# DataSource — Railway provee DATABASE_URL; localmente usar las variables de entorno
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/billing_dashboard}
spring.datasource.username=${DB_USERNAME:billing_user}
spring.datasource.password=${DB_PASSWORD:billing_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
app.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
app.jwt.access-token-expiration=900000
app.jwt.refresh-token-expiration=604800000

# Server
server.port=${PORT:8080}
server.error.include-message=always
server.error.include-binding-errors=always

# OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
